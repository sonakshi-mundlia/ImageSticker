<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collections</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-100">

    <!-- HEADER (optional) -->
    <header class="p-4 bg-white shadow text-center font-bold text-xl">
        My Collections
    </header>

    <!-- COLLECTIONS CONTAINER -->
    <div
        id="collectionsContainer"
        class="p-6"
    >
        <!-- JS will load collections here -->
    </div>

    <!-- EMPTY STATE (optional fallback UI) -->
    <div id="emptyState" class="hidden text-center text-gray-500 p-6">
        No collections yet 
    </div>

    <!-- APP JS (IMPORTANT: always at bottom) -->
    <script src="app.js"></script>

</body>
</html>
