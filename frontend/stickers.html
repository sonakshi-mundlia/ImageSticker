<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Stickers</title>

    <!-- Tailwind (if you are using it) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-100">

    <!-- HEADER (optional) -->
    <header class="p-4 bg-white shadow text-center font-bold text-xl">
        My Stickers
    </header>

    <!-- STICKERS CONTAINER -->
    <div
        id="stickersContainer"
        class="grid grid-cols-2 md:grid-cols-3 gap-4 p-6"
    >
        <!-- JS will inject stickers here -->
    </div>

    <!-- LOADING (optional) -->
    <div id="loader" class="hidden text-center p-4 text-gray-500">
        Loading...
    </div>

    <!-- APP JS (IMPORTANT: keep at bottom) -->
    <script src="app.js"></script>

</body>
</html>
